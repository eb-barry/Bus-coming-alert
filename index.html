<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDX 官方規範連線測試</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-blue-700 mb-4 flex items-center">
            🧪 TDX 標準驗證測試
        </h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Client ID</label>
                <input type="text" id="clientId" placeholder="例如: barry.lin-xxxx..." 
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Client Secret</label>
                <input type="password" id="clientSecret" placeholder="請貼上 Secret" 
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            
            <button onclick="runOfficialTest()" id="testBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">
                執行官方標準請求
            </button>
        </div>

        <div id="resultBox" class="mt-8 hidden border-t pt-6">
            <div id="statusLabel" class="text-lg font-bold mb-2"></div>
            <div class="bg-gray-900 rounded-xl p-4 overflow-hidden">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs text-gray-500 font-mono">DEBUG CONSOLE</span>
                    <span id="httpStatus" class="text-xs font-mono"></span>
                </div>
                <pre id="debugLog" class="text-green-400 text-xs font-mono overflow-auto max-h-64 whitespace-pre-wrap break-all leading-relaxed"></pre>
            </div>
        </div>
    </div>

    <script>
        async function runOfficialTest() {
            const id = document.getElementById('clientId').value.trim();
            const secret = document.getElementById('clientSecret').value.trim();
            const btn = document.getElementById('testBtn');
            const resultBox = document.getElementById('resultBox');
            const statusLabel = document.getElementById('statusLabel');
            const debugLog = document.getElementById('debugLog');
            const httpStatus = document.getElementById('httpStatus');

            if (!id || !secret) return alert("請完整填入 Client ID 與 Secret");

            // 初始化 UI
            btn.disabled = true;
            btn.innerText = "⏳ 正在發送請求...";
            resultBox.classList.remove('hidden');
            debugLog.innerText = "> 初始化請求參數...\n> 目標網址: tdx.transportdata.tw";
            statusLabel.innerText = "連線中...";
            statusLabel.className = "text-blue-600 font-bold";

            try {
                // 依照 TDX 官方規範建構 Body (x-www-form-urlencoded)
                const params = new URLSearchParams();
                params.append('grant_type', 'client_credentials');
                params.append('client_id', id);
                params.append('client_secret', secret);

                debugLog.innerText += "\n> 發送 POST 請求 (Content-Type: application/x-www-form-urlencoded)";

                const response = await fetch("https://tdx.transportdata.tw/auth/realms/TDX/protocol/openid-connect/token", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params
                });

                httpStatus.innerText = `HTTP ${response.status}`;
                httpStatus.className = response.ok ? "text-green-500" : "text-red-500";

                const data = await response.json();

                if (response.ok) {
                    statusLabel.innerText = "✅ 驗證成功！";
                    statusLabel.className = "text-green-600 font-bold text-lg";
                    debugLog.innerText += "\n\n[SUCCESS] 成功取得 Access Token:\n" + data.access_token;
                } else {
                    statusLabel.innerText = "❌ 驗證失敗";
                    statusLabel.className = "text-orange-600 font-bold text-lg";
                    debugLog.innerText += "\n\n[ERROR] 伺服器回傳錯誤:\n" + JSON.stringify(data, null, 2);
                }

            } catch (err) {
                statusLabel.innerText = "🚫 連線遭攔截 (Load Failed)";
                statusLabel.className = "text-red-600 font-bold text-lg";
                debugLog.innerText += `\n\n[CRITICAL] 請求未到達伺服器：\n${err.name}: ${err.message}`;
                debugLog.innerText += "\n\n這通常是瀏覽器的跨網域 (CORS) 限制導致。";
            } finally {
                btn.disabled = false;
                btn.innerText = "再次執行測試";
            }
        }
    </script>
</body>
</html>
