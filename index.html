<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙北公車語音助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 避免 iPhone Safari 點擊縮放 */
        input, select, button { font-size: 16px !important; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-900">
    <div class="max-w-md mx-auto min-h-screen p-6 flex flex-col">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600">🚌 Bus Speaker</h1>
            <p class="text-slate-500 text-sm mt-1">雙北公車即時語音監測系統</p>
        </header>
        
        <div id="setupSection" class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg">🔑 API 金鑰設定</h2>
                <button onclick="clearKeys()" class="text-xs text-red-500 hover:text-red-700">清除紀錄</button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Client ID (需含 barry.lin-)</label>
                    <input type="password" id="clientId" placeholder="請點擊 TDX 官網複製按鈕貼入" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Client Secret</label>
                    <input type="password" id="clientSecret" placeholder="請貼入完整密鑰字串" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg">
                </div>
                <button onclick="saveKeys()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition-transform">儲存並進入系統</button>
            </div>
        </div>

        <div id="mainSection" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
                <p class="text-sm font-bold text-slate-400 mb-3">STEP 1: 輸入公車路線</p>
                <div class="flex gap-2">
                    <input type="text" id="routeInput" inputmode="search" placeholder="例如: 647, 綠1" class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <button onclick="searchRoute()" id="searchBtn" class="bg-blue-600 text-white px-6 rounded-lg font-bold">搜尋</button>
                </div>
            </div>

            <div id="directionSection" class="hidden bg-white p-6 rounded-2xl shadow-xl border border-slate-100 animate-fade-in">
                <p class="text-sm font-bold text-slate-400 mb-3">STEP 2: 選擇行駛方向</p>
                <select id="directionSelect" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg appearance-none"></select>
            </div>
        </div>
    </div>

    <script>
        let accessToken = null;

        // 頁面載入檢查
        window.onload = () => {
            if (localStorage.getItem('tdx_id')) {
                document.getElementById('setupSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
            }
        };

        function saveKeys() {
            const id = document.getElementById('clientId').value.trim();
            const secret = document.getElementById('clientSecret').value.trim();
            if (!id || !secret) return alert("請填入完整金鑰！");
            localStorage.setItem('tdx_id', id);
            localStorage.setItem('tdx_secret', secret);
            location.reload();
        }

        function clearKeys() {
            if(confirm("確定要清除金鑰紀錄嗎？")) {
                localStorage.clear();
                location.reload();
            }
        }

        // 取得 Token (強化相容性)
        async function getAccessToken() {
            const id = localStorage.getItem('tdx_id');
            const secret = localStorage.getItem('tdx_secret');
            
            try {
                const res = await fetch("https://tdx.transportdata.tw/auth/realms/TDX/protocol/openid-connect/token", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'client_credentials',
                        client_id: id,
                        client_secret: secret
                    })
                });

                if (!res.ok) {
                    const errorMsg = await res.json();
                    throw new Error(errorMsg.error_description || "驗證失敗");
                }

                const data = await res.json();
                return data.access_token;
            } catch (e) {
                alert("TDX 驗證錯誤：\n" + e.message + "\n\n提示：請確認 Client ID 是否包含完整前綴。");
                return null;
            }
        }

        // 搜尋路線 (支援雙北自動切換)
        async function searchRoute() {
            const routeName = document.getElementById('routeInput').value.trim();
            if (!routeName) return;

            const btn = document.getElementById('searchBtn');
            btn.innerHTML = '<span class="inline-block loading-spin">⌛</span>';
            btn.disabled = true;

            accessToken = await getAccessToken();
            if (!accessToken) {
                btn.innerText = "搜尋";
                btn.disabled = false;
                return;
            }

            // 同時檢查台北市與新北市 API
            const cities = ["Taipei", "NewTaipei"];
            let foundData = null;

            for (const city of cities) {
                try {
                    const res = await fetch(`https://tdx.transportdata.tw/api/basic/v2/Bus/Route/City/${city}/${routeName}?$format=JSON`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    const data = await res.json();
                    if (data && data.length > 0) {
                        // 精確比對路線名稱
                        foundData = data.find(r => r.RouteName.Zh_tw === routeName) || data[0];
                        break;
                    }
                } catch (e) { console.error(`搜尋 ${city} 失敗:`, e); }
            }

            btn.innerText = "搜尋";
            btn.disabled = false;

            if (!foundData) {
                alert("找不到路線「" + routeName + "」\n請確認名稱是否正確（如：綠1、647）。");
                return;
            }

            // 更新選單
            const dirSelect = document.getElementById('directionSelect');
            dirSelect.innerHTML = `
                <option value="">選擇方向...</option>
                <option value="0">去程 (往 ${foundData.DestinationStopNameZh})</option>
                <option value="1">回程 (往 ${foundData.DepartureStopNameZh})</option>
            `;
            document.getElementById('directionSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
