<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDX 連線測試</title>
</head>
<body style="font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.6;">
    <h2 style="color: #2563eb;">🧪 TDX 連線診斷工具</h2>
    <p style="font-size: 14px; color: #666;">請輸入您在 TDX 官網複製的完整金鑰：</p>

    <div style="margin-bottom: 15px;">
        <label style="display:block; font-size: 12px; margin-bottom: 5px;">Client ID (需含 barry.lin-)</label>
        <input type="text" id="testId" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;" placeholder="貼上完整 ID">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display:block; font-size: 12px; margin-bottom: 5px;">Client Secret</label>
        <input type="password" id="testSecret" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;" placeholder="貼上完整 Secret">
    </div>

    <button id="runTest" style="width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        開始發送測試請求
    </button>

    <div id="resultBox" style="margin-top: 20px; display: none;">
        <hr>
        <h3 id="statusTitle">診斷結果</h3>
        <div id="statusDesc" style="font-size: 14px; margin-bottom: 10px;"></div>
        <pre id="rawResponse" style="background: #f4f4f4; padding: 15px; border-radius: 8px; font-size: 11px; white-space: pre-wrap; word-break: break-all; color: #333;"></pre>
    </div>

    <script>
        document.getElementById('runTest').onclick = async () => {
            const id = document.getElementById('testId').value.trim();
            const secret = document.getElementById('testSecret').value.trim();
            const resultBox = document.getElementById('resultBox');
            const statusTitle = document.getElementById('statusTitle');
            const statusDesc = document.getElementById('statusDesc');
            const rawResponse = document.getElementById('rawResponse');

            if (!id || !secret) return alert("請輸入完整金鑰");

            resultBox.style.display = 'block';
            statusTitle.innerText = "⏳ 正在連線中...";
            statusDesc.innerText = "正在嘗試與 TDX 伺服器建立握手協定...";
            rawResponse.innerText = "";

            try {
                // iPhone Safari 最相容的 fetch 寫法
                const response = await fetch("https://tdx.transportdata.tw/auth/realms/TDX/protocol/openid-connect/token", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `grant_type=client_credentials&client_id=${encodeURIComponent(id)}&client_secret=${encodeURIComponent(secret)}`,
                    cache: 'no-store'
                });

                const data = await response.json();

                if (response.ok) {
                    statusTitle.innerText = "✅ 連線成功！";
                    statusTitle.style.color = "green";
                    statusDesc.innerText = "您的金鑰正確，且 iPhone 網路連線正常。";
                    rawResponse.innerText = "Access Token 取得成功：\n" + data.access_token;
                } else {
                    statusTitle.innerText = "❌ 驗證失敗";
                    statusTitle.style.color = "orange";
                    statusDesc.innerText = "TDX 伺服器有回應，但拒絕了您的金鑰。";
                    rawResponse.innerText = JSON.stringify(data, null, 2);
                }
            } catch (err) {
                statusTitle.innerText = "🚫 網路阻斷 (Load Failed)";
                statusTitle.style.color = "red";
                statusDesc.innerText = "請求尚未到達伺服器就被 iPhone 系統攔截了。";
                rawResponse.innerText = `錯誤類型: ${err.name}\n詳細內容: ${err.message}\n\n這通常是 Safari 的安全限制或網路節點封鎖。`;
            }
        };
    </script>
</body>
</html>
